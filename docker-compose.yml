services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aim_dev
      POSTGRES_USER: aim
      POSTGRES_PASSWORD: aim_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Drop your .sql dump into docker/initdb/ — it runs automatically on first `docker compose up`
      - ./docker/initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aim -d aim_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      # Live code reloading — edits on your machine reflect immediately
      - .:/app
      # Persist uploaded media files across container restarts
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_files:
