{% extends "base.html" %}
{% load cms_tags djangocms_alias_tags %}
{% load static %}
{% block title %}
    {% page_attribute "page_title" %}
{% endblock title %}
{% block content %}
    <section class="header-banner" tag="banner">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1>{% placeholder "page_title" %}</h1>
                </div>
            </div>
        </div>
    </section>
    <div class="container">
        <div class="theme-bg mt-4 mb-4 p-3">{% placeholder "page_content" %}</div>
    </div>
{% endblock content %}
